name: tradingbot
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy=1.26.*
  - pandas>=2.1
  - matplotlib>=3.7
  - matplotlib-inline
  - tqdm
  - psutil
  - scikit-learn>=1.3
  - pip
  - pip:
      - python-binance>=1.0.33
      - xgboost>=3.0.5
      - catboost>=1.2.8
      - python-dotenv>=1.0
      - joblib>=1.3
